# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

on:
  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:

  schedule:
    - cron: "0 10 * * *"
env:
  PYTHON_VERSION: ${{ secrets.MY_PYTHON_VERSION }}
  
jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ubuntu-latest
    # strategy:
    #   matrix:
    #     python-version: ["3.11", "3.12"]
        
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        
      - name: List repository files
        run: ls -la
          
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          #python-version: ${{ matrix.python-version }}
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Print Python version
        run: python --version
        
      - name: Print runner time
        run: date

      - name: Run tests
        run: python -m unittest discover -s tests -v
