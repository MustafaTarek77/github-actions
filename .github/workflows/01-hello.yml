# This first workflow is intentionally tiny.
# It helps students see what a GitHub Actions run looks like.
name: 01 Hello Workflow

on:
  # React to pull request activity targeting main.
  pull_request:
    branches:
      - main
    types:
      - closed
  # Allow a safe manual run from the Actions tab too.
  workflow_dispatch:

jobs:
  say-hello:
    # GitHub provides a fresh runner for the job.
    runs-on: ubuntu-latest

    steps:
      - name: Say hello (merged)
        # "closed" fires both when a PR is merged and when it's closed without merging.
        if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
        run: echo "Hello from GitHub Actions — this pull request was merged, Mustafa Tarek"

      - name: Say hello (closed without merging)
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == false
        run: echo "Hello from GitHub Actions — this pull request was closed without merging, Mustafa Tarek"
